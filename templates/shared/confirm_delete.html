{% extends 'base.html' %}

{% block page_title %}Delete Record{% endblock %}
{% block content %}
<div class="card-panel form-panel">
    <h3 class="h4 mb-3">Confirm deletion</h3>
    <p class="subtle-text">This action will remove <strong>{{ object }}</strong> from the system.</p>
    <form method="post">
        {% csrf_token %}
        <div class="d-flex gap-3">
            <button type="submit" class="btn btn-danger">Delete</button>
            <a href="javascript:history.back()" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
