{% extends 'base.html' %}

{% block auth_content %}
<section class="auth-shell">
    <div class="auth-card single-card">
        <div class="auth-form">
            <h2>Password Reset</h2>
            <p class="subtle-text">Enter your registered email and Django will generate a secure reset flow.</p>
            <form method="post">
                {% csrf_token %}
                {{ form.email.label_tag }}
                {{ form.email }}
                <button class="btn btn-primary w-100 mt-3" type="submit">Send Reset Link</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
